<!DOCTYPE html>
<html lang="en">
    <head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration page</title>
 
    </head>
<body>
    <h1>Registration Form</h1><br>
    <form action="#" method="post">
 
    <label for="fullname">Full Name:</label><br>
    <input type="text" id="fullname" name="fullname" required><br><br>
 
    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" required><br><br>
 
    <label for="phone">Phone number:</label><br>
    <input type="number" id="phone" name="phone" required><br><br>
 
    <label>Gender:</label><br>
    <input type="radio" id="gender" name="gender" value="Male">
    <label for="option1">Male</label>
 
    <input type="radio" id="gender" name="gender" value="Female">
    <label for="option1">Female</label>
 
    <input type="radio" id="gender" name="gender" value="Other">
    <label for="option1">Other</label><br><br>
 
    <label for="dateofbirth">Date of Birth:</label><br>
    <input type="date" id="dateofbirth" name="dateofbirth" required><br><br>
 
    <label for="password">Password:</label><br>
    <input type="password" id="password" name="password" required><br><br>
 
    <label for="password">Confirm Password:</label><br>
    <input type="password" id="password" name="password" required><br><br>
 
    <label for="address">Address:</label><br>
    <textarea id="address" name="address" rows="4" column="20" required></textarea><br><br>
 
    <label for="department">Department:</label><br>
    <select>
        <option value="CSE">CSE</option>
        <option value="EEE">EEE</option>
        <option value="ARCH">ARCH</option>
        <option value="ENGLISH">ENGLISH</option>
        <option value="BBA">BBA</option>
 
    </select><br><br>
 
    <input type="radio" required><label>I agree with the term and conditions</label><br><br>
 
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">
 
</body>
</html>
